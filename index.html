<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عمران العمر | مهندس أمن سيبراني</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0e; --bg2: #080f14; --panel: #0a1520;
    --green: #00ff88; --cyan: #00e5ff; --red: #ff3366;
    --text: #c8dce8; --muted: #4a6a7a; --border: #0d2030;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Tajawal', sans-serif; overflow-x: hidden;
    cursor: none; 
  }

  /* المؤشر المخصص */
  .cursor { width: 12px; height: 12px; background: var(--green); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); box-shadow: 0 0 10px var(--green); }
  .cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(0,255,136,0.4); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: all 0.1s ease; }

  /* الخلفية */
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px); background-size: 40px 40px; z-index: 0; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(5,10,14,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'Share Tech Mono', monospace; color: var(--green); }
  .nav-links { display: flex; gap: 30px; list-style: none; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
  .nav-links a:hover { color: var(--green); }

  /* HERO SECTION - الحل هنا */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between; /* توزيع العناصر */
    padding: 100px 8%;
    position: relative;
    z-index: 2;
    gap: 20px;
  }

  .hero-content { flex: 1; max-width: 600px; text-align: right; }
  .hero h1 { font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; line-height: 1.2; margin-bottom: 15px; }
  .highlight { color: var(--green); text-shadow: 0 0 20px rgba(0,255,136,0.3); }

  /* العنصر الديكوري - تم إصلاح الموضع */
  .hero-deco {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    max-width: 400px;
    height: 400px;
  }

  .shield-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(0,255,136,0.1); animation: rotate 20s linear infinite; }
  .shield-ring:nth-child(1) { width: 100%; height: 100%; }
  .shield-ring:nth-child(2) { width: 75%; height: 75%; border-color: rgba(0,229,255,0.1); animation-direction: reverse; }
  .shield-center { font-size: clamp(3rem, 8vw, 6rem); filter: drop-shadow(0 0 20px var(--green)); }

  @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* التنسيقات العامة */
  .btn-primary { padding: 12px 28px; background: var(--green); color: #050a0e; border: none; font-weight: 700; cursor: pointer; text-decoration: none; clip-path: polygon(0 0, 90% 0, 100% 20%, 100% 100%, 10% 100%, 0 80%); }
  .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); background: var(--bg2); border-y: 1px solid var(--border); }
  .stat-item { padding: 30px; text-align: center; border: 1px solid var(--border); }
  .stat-num { font-size: 2.5rem; color: var(--green); font-family: 'Share Tech Mono'; }

  /* قسم التواصل */
  .contact-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 50px 0; }
  .form-group { margin-bottom: 15px; }
  .form-input, .form-textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); color: white; padding: 12px; }

  @media (max-width: 768px) {
    .hero { flex-direction: column; text-align: center; padding-top: 150px; }
    .hero-content { text-align: center; }
    .hero-deco { order: -1; width: 250px; height: 250px; margin: 0 auto; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <div class="nav-logo">[<span>OA</span>_SEC]</div>
  <ul class="nav-links">
    <li><a href="#about">عني</a></li>
    <li><a href="#skills">المهارات</a></li>
    <li><a href="#contact">تواصل</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1 class="glitch" data-text="عمران العمر">مرحباً، أنا <br><span class="highlight">عمران العمر</span></h1>
    <p id="typedText" style="color: var(--cyan); font-family: 'Share Tech Mono'; height: 24px;"></p>
    <p style="margin: 20px 0 40px; color: var(--muted);">مهندس أمن سيبراني متخصص في حماية الأنظمة واختبار الاختراق.</p>
    <a href="#contact" class="btn-primary">تواصل معي الآن</a>
  </div>

  <div class="hero-deco">
    <div class="shield-ring"></div>
    <div class="shield-ring"></div>
    <div class="shield-center">🛡️</div>
  </div>
</section>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num">3</div><div class="stat-label">تخصصات</div></div>
  <div class="stat-item"><div class="stat-num">10+</div><div class="stat-label">أدوات أمنية</div></div>
  <div class="stat-item"><div class="stat-num">100%</div><div class="stat-label">شغف</div></div>
</div>

<section id="contact" style="padding: 80px 8%;">
  <h2 style="margin-bottom: 30px;">تواصل <span>معي</span></h2>
  <div class="contact-wrapper">
    <div>
      <p>يمكنك مراسلتي مباشرة عبر واتساب، سأرد عليك في أقرب وقت.</p>
    </div>
    <div class="contact-form">
      <div class="form-group"><input type="text" id="wa-name" class="form-input" placeholder="اسمك"></div>
      <div class="form-group"><textarea id="wa-message" class="form-textarea" placeholder="رسالتك"></textarea></div>
      <button onclick="sendWhatsApp()" class="btn-primary" style="width: 100%;">إرسال للواتساب</button>
    </div>
  </div>
</section>

<script>
  // تحريك الماوس
  document.addEventListener('mousemove', (e) => {
    document.getElementById('cursor').style.left = e.clientX + 'px';
    document.getElementById('cursor').style.top = e.clientY + 'px';
    document.getElementById('cursorRing').style.left = e.clientX + 'px';
    document.getElementById('cursorRing').style.top = e.clientY + 'px';
  });

  // إرسال واتساب (معدل)
  function sendWhatsApp() {
    const name = document.getElementById('wa-name').value;
    const message = document.getElementById('wa-message').value;
    const myNumber = "963992433390"; // رقمك بدون +

    if(!name || !message) { alert("املأ البيانات يا غالي"); return; }

    const text = encodeURIComponent(`مرحباً عمران،\nالاسم: ${name}\nالرسالة: ${message}`);
    window.open(`https://wa.me/${myNumber}?text=${text}`, '_blank');
  }

  // تأثير الكتابة
  const words = ["Cyber Security Engineer", "Pentester", "Bug Hunter"];
  let i = 0, j = 0, current = "", isDeleting = false;

  function type() {
    current = words[i];
    if(isDeleting) {
      document.getElementById('typedText').textContent = current.substring(0, j-1);
      j--;
    } else {
      document.getElementById('typedText').textContent = current.substring(0, j+1);
      j++;
    }

    if(!isDeleting && j === current.length) {
      isDeleting = true;
      setTimeout(type, 2000);
    } else if(isDeleting && j === 0) {
      isDeleting = false;
      i = (i + 1) % words.length;
      setTimeout(type, 500);
    } else {
      setTimeout(type, isDeleting ? 50 : 100);
    }
  }
  type();
</script>

</body>
</html>
